# ===========================================
# 测试环境配置文件
# ===========================================
spring:
  application:
    name: admin-system-test

  # ===========================================
  # 数据源配置 (测试数据库)
  # ===========================================
  datasource:
    url: jdbc:mysql://localhost:3306/admin_system_test?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&createDatabaseIfNotExist=true
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10

  # ===========================================
  # Redis 配置
  # ===========================================
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 1
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 5
          max-idle: 2
          min-idle: 1

  # ===========================================
  # Flyway 配置
  # ===========================================
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  # ===========================================
  # RocketMQ 配置
  # ===========================================
  rocketmq:
    name-server: localhost:9876
    producer:
      group: seckill_producer_group_test
      send-message-timeout: 3000

  # ===========================================
  # Redisson 配置
  # ===========================================
  redisson:
    single-server-config:
      address: redis://localhost:6379
      connection-minimum-idle-size: 2
      connection-pool-size: 5
      idle-connection-timeout: 10000
      connect-timeout: 10000
      timeout: 3000
      retry-attempts: 3
      retry-interval: 1500

# ===========================================
# 秒杀业务配置
# ===========================================
seckill:
  limiter:
    qps: 1000
    concurrency: 500
    ip-rate: 100
  lock:
    wait-time: 5
    lease-time: 10
  order:
    timeout: 900
  sse:
    timeout: 60000

# ===========================================
# MyBatis Plus 配置
# ===========================================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===========================================
# 日志配置
# ===========================================
logging:
  level:
    cn.coderstory: DEBUG
