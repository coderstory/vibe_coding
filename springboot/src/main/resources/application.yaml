# ===========================================
# 应用基础配置
# ===========================================
spring:
  application:
    name: admin-system
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # ===========================================
  # Flyway 数据库迁移配置
  # ===========================================
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-description: "init"
    baseline-version: "0"
    locations: classpath:db/migration

  # ===========================================
  # 数据源配置 (MySQL)
  # ===========================================
  datasource:
    url: jdbc:mysql://localhost:3306/admin_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  # ===========================================
  # Redis 配置
  # - 用于缓存、限流、分布式锁
  # ===========================================
  data:
    redis:
      host: localhost              # Redis 服务器地址
      port: 6379                   # Redis 端口
      password:                    # Redis 密码（无密码留空）
      database: 0                  # 使用的数据库编号
      timeout: 3000ms              # 连接超时时间
      lettuce:
        pool:
          max-active: 20           # 最大连接数
          max-idle: 10             # 最大空闲连接数
          min-idle: 5              # 最小空闲连接数
          max-wait: 3000ms         # 最大等待时间

# ===========================================
# RocketMQ 5.3.2 配置
# - 用于异步消息处理和事务消息
# ===========================================
rocketmq:
  name-server: localhost:9876     # RocketMQ NameServer 地址（集群用分号分隔）
  producer:
    group: seckill_producer_group  # 生产者组名
    send-message-timeout: 3000    # 发送消息超时时间(ms)

# ===========================================
# Redisson 单机模式配置
# - 用于分布式锁
# ===========================================
redisson:
  single-server-config:
    address: redis://localhost:6379  # Redis 连接地址
    connection-minimum-idle-size: 5  # 最小空闲连接数
    connection-pool-size: 20         # 连接池大小
    idle-connection-timeout: 10000  # 空闲连接超时时间(ms)
    connect-timeout: 10000           # 连接超时时间(ms)
    timeout: 3000                   # 命令执行超时时间(ms)

# ===========================================
# 秒杀业务专用配置
# ===========================================
seckill:
  # 限流器配置
  limiter:
    qps: 1000          # 每秒允许请求数（QPS限制）
    concurrency: 500   # 最大并发处理数
    ip-rate: 100       # 每IP每秒最大请求数
  # 分布式锁配置
  lock:
    wait-time: 5       # 等待获取锁时间(秒)
    lease-time: 10     # 锁持有时间(秒)，自动释放
  # 订单配置
  order:
    timeout: 900       # 订单超时时间(秒)，默认15分钟
  # SSE 配置
  sse:
    timeout: 300000    # SSE 连接超时时间(ms)，默认5分钟

# ===========================================
# MyBatis Plus 配置
# ===========================================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===========================================
# 服务器配置
# ===========================================
server:
  port: 8080

# ===========================================
# 安全配置
# ===========================================
security:
  whitelist: /api/auth/**,/api/knowledge/files/**

# ===========================================
# JWT 配置
# ===========================================
jwt:
  secret: mySecretKeyForJwtTokenGeneration123456789
  expiration: 86400000
  refresh-expiration: 604800000

# ===========================================
# 日志配置
# ===========================================
logging:
  level:
    cn.coderstory: debug
    org.flywaydb: DEBUG
