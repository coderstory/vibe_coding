# ===========================================
# 应用基础配置
# ===========================================
spring:
  application:
    name: admin-system

  # 文件上传配置
  servlet:
    multipart:
      max-file-size: 20MB
      max-request-size: 20MB

  # ===========================================
  # Flyway 数据库迁移配置
  # ===========================================
  flyway:
    enabled: true
    baseline-on-migrate: true
    baseline-description: "init"
    baseline-version: "0"
    locations: classpath:db/migration

  # ===========================================
  # 数据源配置 (MySQL)
  # ===========================================
  datasource:
    url: jdbc:mysql://localhost:3306/admin_system?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&useSSL=false
    username: root
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 600000
      max-lifetime: 1800000
      connection-timeout: 30000

  # ===========================================
  # Redis 配置
  # ===========================================
  data:
    redis:
      host: localhost
      port: 6379
      password:
      database: 0
      timeout: 3000ms
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms

  # ===========================================
  # RocketMQ 5.3.2 配置
  # ===========================================
  rocketmq:
    name-server: localhost:9876
    producer:
      group: seckill_producer_group
      send-message-timeout: 3000

  # ===========================================
  # Redisson 配置
  # ===========================================
  redisson:
    single-server-config:
      address: redis://localhost:6379
      connection-minimum-idle-size: 5
      connection-pool-size: 20
      idle-connection-timeout: 10000
      connect-timeout: 10000
      timeout: 3000
      retry-attempts: 3
      retry-interval: 1500

# ===========================================
# 秒杀业务专用配置
# ===========================================
seckill:
  limiter:
    qps: 1000
    concurrency: 500
    ip-rate: 100
  lock:
    wait-time: 5
    lease-time: 10
  order:
    timeout: 900
  sse:
    timeout: 300000

# ===========================================
# MyBatis Plus 配置
# ===========================================
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml
  global-config:
    db-config:
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

# ===========================================
# 服务器配置
# ===========================================
server:
  port: 8080

# ===========================================
# 安全配置
# ===========================================
security:
  whitelist: /api/auth/**,/api/knowledge/files/**

# ===========================================
# JWT 配置
# ===========================================
jwt:
  secret: mySecretKeyForJwtTokenGeneration123456789
  expiration: 86400000
  refresh-expiration: 604800000

# ===========================================
# 日志配置
# ===========================================
logging:
  level:
    cn.coderstory: debug
    org.flywaydb: DEBUG
